workflows:
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - keystore_credentials
      node: 20.19.0
      vars:
        PACKAGE_NAME: "com.miaoda.appd2y8vp5n1s75"
    cache:
      cache_paths:
        - $HOME/.pnpm-store
        - node_modules
        - packages/*/node_modules
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9
      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile=false
      - name: Setup Expo and EAS
        script: |
          npm install -g eas-cli@latest
      - name: Setup keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > android/app/keystore.jks
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=keystore.jks
          MYAPP_UPLOAD_KEY_ALIAS=$CM_KEY_ALIAS
          MYAPP_UPLOAD_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          MYAPP_UPLOAD_KEY_PASSWORD=$CM_KEY_PASSWORD
          EOF
      - name: Prebuild Android
        script: |
          npx expo prebuild --platform android --clean
      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=keystore.jks \
            -PMYAPP_UPLOAD_KEY_ALIAS=$CM_KEY_ALIAS \
            -PMYAPP_UPLOAD_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD \
            -PMYAPP_UPLOAD_KEY_PASSWORD=$CM_KEY_PASSWORD
      - name: Copy APK to artifacts
        script: |
          mkdir -p build/outputs
          cp android/app/build/outputs/apk/release/app-release.apk build/outputs/screencast-receiver.apk
    artifacts:
      - build/outputs/**/*.apk
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - tx2333@users.noreply.github.com
